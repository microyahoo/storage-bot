{{define "layout"}}<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Storage Bot{{if .Title}} — {{.Title}}{{end}}</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --line:#252a33; --text:#e8eaed; --muted:#8b94a4; --acc:#4f8cff; --ok:#39c172; --warn:#f5b942; --err:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { background:var(--card); border-bottom:1px solid var(--line); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  header nav a { color:var(--muted); margin-left:18px; text-decoration:none; font-size:13px; }
  header nav a:hover, header nav a.active { color:var(--text); }
  main { padding:24px; max-width:1280px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:16px 20px; margin-bottom:18px; }
  .card h2 { margin:0 0 12px; font-size:14px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  a { color:var(--acc); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .badge.ok { background:rgba(57,193,114,0.15); color:var(--ok); }
  .badge.warn { background:rgba(245,185,66,0.15); color:var(--warn); }
  .badge.err { background:rgba(239,68,68,0.15); color:var(--err); }
  .stat-row { display:flex; gap:18px; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px 20px; flex:1; }
  .stat .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
  .stat .value { font-size:28px; font-weight:600; margin-top:4px; }
  pre { background:#0a0c10; border:1px solid var(--line); border-radius:6px; padding:14px 16px; overflow:auto; font:12px/1.5 "SF Mono",Menlo,Consolas,monospace; max-height:600px; }
  form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  select, input[type=text] { background:var(--bg); border:1px solid var(--line); color:var(--text); padding:7px 10px; border-radius:5px; font-size:13px; min-width:180px; }
  button { background:var(--acc); border:none; color:white; padding:8px 18px; border-radius:5px; font-size:13px; font-weight:500; cursor:pointer; }
  button:hover { background:#3a78ec; }
  .muted { color:var(--muted); font-size:12px; }
  .empty { color:var(--muted); padding:40px; text-align:center; font-size:13px; }
  .err-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:var(--err); padding:10px 14px; border-radius:6px; margin-bottom:14px; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>Storage Bot Admin</h1>
  <nav>
    <a href="/" {{if eq .Page "home"}}class="active"{{end}}>集群</a>
    <a href="/skills" {{if eq .Page "skills"}}class="active"{{end}}>Skills</a>
    <a href="/run" {{if eq .Page "run"}}class="active"{{end}}>执行</a>
  </nav>
</header>
<main>{{block "content" .}}{{end}}</main>
</body>
</html>{{end}}
