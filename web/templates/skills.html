{{define "skills-content"}}
<div class="card">
  <h2>可用 Skills ({{len .Skills}})</h2>
  <table>
    <thead><tr><th style="width:220px">名称</th><th>描述</th><th style="width:120px">操作</th></tr></thead>
    <tbody>
    {{range .Skills}}
      <tr>
        <td><code>{{.Name}}</code></td>
        <td>{{.Description}}</td>
        <td><a href="/run?skill={{.Name}}">执行 →</a></td>
      </tr>
    {{end}}
    </tbody>
  </table>
</div>
{{end}}
{{define "content"}}{{template "skills-content" .}}{{end}}
